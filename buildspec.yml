version: 0.2

phases:
  install:
    runtime-versions:
      python: "3.11"
    commands:
      - pip install --upgrade pip
      - pip install -r blacklist_app/requirements-test.txt

  pre_build:
    commands:
      - echo "=== Running unit tests ==="
      - cd $CODEBUILD_SRC_DIR/blacklist_app && python -m pytest tests/unit/ -v

  build:
    commands:
      - echo "=== Packaging Elastic Beanstalk artifact from blacklist_app ==="

  post_build:
    commands:
      - echo "=== Build completed. Deployment is handled by the CodePipeline Deploy stage ==="

artifacts:
  base-directory: blacklist_app
  files:
    - '**/*'
