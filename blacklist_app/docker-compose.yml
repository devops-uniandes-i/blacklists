name: blacklist_service

services:
  app:
    build: .
    container_name: blacklist-app
    ports:
      - "3012:80"
    depends_on:
      db:
        condition: service_healthy   # ← espera que Postgres esté LISTO
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/blacklist-db
      PORT: 80
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-secret}
      AUTH_USERNAME: ${AUTH_USERNAME:-admin}
      AUTH_PASSWORD: ${AUTH_PASSWORD:-admin}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  db:
    image: postgres:16
    container_name: blacklist-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: blacklist-db
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d blacklist-db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
